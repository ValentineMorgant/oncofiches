<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OncoFiches</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1e293b;font-size:14px;line-height:1.5}
:root{--hd:#2a4d8f;--pk:#c0007a;--gn:#1a7a2e;--theme:#2a4d8f}
.hp{color:var(--pk)}.hg{color:var(--gn)}

.T{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.T th,.T td{border:1px solid #cbd5e1;padding:7px 9px;text-align:left;vertical-align:top;line-height:1.5}
.T th{background:#e8edf4;font-weight:700;font-size:11.5px}
.T ul{margin:2px 0 2px 16px;padding:0}.T li{margin-bottom:3px}
.T-hdr{background:var(--hd)!important;color:inherit!important}
.content h3{margin:0 0 12px;font-size:15px;color:var(--theme);padding-bottom:7px;border-bottom:2px solid var(--theme)}
.content h4{margin:14px 0 6px;font-size:13px;color:#334155;font-weight:700}
.A{border:2px solid var(--theme);border-radius:10px;padding:16px;margin:14px 0;background:#f8fafc}
.AT{text-align:center;font-weight:800;font-size:14px;color:var(--theme);border-bottom:2px solid var(--theme);padding-bottom:8px;margin-bottom:12px}
.N{border:2px solid var(--theme);border-radius:8px;padding:9px 13px;text-align:center;font-size:11.5px;line-height:1.4;background:#fff;display:inline-block;max-width:250px;vertical-align:top}
.Nr{background:#dbeafe;border-color:#2563eb}.No{background:#fef9c3;border-color:#ca8a04}
.Nk{background:#dcfce7;border-color:#16a34a}.Nx{background:#fee2e2;border-color:#dc2626}
.AR{text-align:center;font-size:20px;color:var(--theme);margin:5px 0;line-height:1}
.R{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.CN{display:flex;flex-direction:column;align-items:center}
.BL{font-size:10.5px;font-weight:700;color:#475569;text-align:center;margin-bottom:4px}
.NT{font-size:11px;color:#64748b;font-style:italic;margin:5px 0}
.W{border:1.5px solid #dc2626;border-radius:6px;padding:7px 11px;background:#fef2f2;font-size:11.5px;text-align:center;margin:10px 0;color:#991b1b}
.NW{border:1.5px dashed var(--gn);border-radius:6px;padding:9px 13px;background:#f0fdf4;font-size:11.5px;margin:10px 0}
.I{border:1.5px solid #3b82f6;border-radius:6px;padding:9px 13px;background:#eff6ff;font-size:11.5px;margin:10px 0}
.WA{border:1.5px solid #d97706;border-radius:6px;padding:7px 11px;background:#fffbeb;font-size:11.5px;margin:8px 0;color:#92400e}

/* AUTH */
#auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:#fff;border-radius:16px;padding:36px;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.auth-box h1{font-size:24px;color:var(--theme);margin-bottom:4px}
.auth-box .sub{color:#64748b;font-size:13px;margin-bottom:24px}
.auth-input{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:12px;font-family:inherit}
.auth-input:focus{outline:none;border-color:var(--theme)}
.auth-btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
.auth-btn-primary{background:var(--theme);color:#fff}
.auth-btn-primary:hover{opacity:.9}
.auth-btn-google{background:#fff;color:#333;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;gap:8px}
.auth-btn-google:hover{background:#f8fafc}
.auth-divider{text-align:center;color:#94a3b8;font-size:12px;margin:16px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#e2e8f0}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.auth-msg{text-align:center;padding:12px;border-radius:8px;margin-bottom:12px;font-size:13px}
.auth-msg-ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.auth-msg-err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.auth-tabs{display:flex;margin-bottom:20px;border-bottom:2px solid #e2e8f0}
.auth-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;margin-bottom:-2px}
.auth-tab.active{color:var(--theme);border-bottom-color:var(--theme)}

/* HEADER */
.main-header{background:linear-gradient(135deg,#0f172a,var(--theme));color:#fff;padding:20px 18px 16px}
.main-header h1{font-size:22px;font-weight:800}
.main-header .sub{font-size:12px;opacity:.7;margin-top:2px}
#searchbar{width:100%;padding:10px 12px 10px 36px;border-radius:10px;border:none;font-size:14px;background:rgba(255,255,255,.95);margin-top:12px}
.stats{display:flex;gap:10px;padding:12px 18px}
.stat-box{flex:1;background:#fff;border-radius:10px;padding:10px 14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-val{font-size:24px;font-weight:800}
.stat-label{font-size:11px;color:#64748b;margin-top:2px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:5px solid var(--theme);transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1)}
.card-title{font-size:17px;font-weight:700;margin-bottom:4px}
.card-meta{font-size:12px;color:#64748b}
.card-meta .badge{background:#f1f5f9;padding:2px 8px;border-radius:6px;margin-right:5px;font-weight:600}
.ann-badge{background:#fef3cd;border-radius:8px;padding:2px 8px;font-size:10px;color:#92400e;font-weight:600}
.user-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:linear-gradient(135deg,#0f172a,var(--theme));color:#fff;font-size:13px;position:sticky;top:0;z-index:25;box-shadow:0 3px 10px rgba(0,0,0,.25);border-bottom:2px solid rgba(255,255,255,.1)}
.user-bar .user-info{display:flex;align-items:center;gap:8px}
.user-bar .user-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.user-bar .user-details{line-height:1.3}
.user-bar .user-details .name{font-weight:600;font-size:13px}
.user-bar .user-details .role{font-size:10px;opacity:.7}
.user-bar .user-actions{display:flex;gap:6px}
.user-bar button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;font-weight:500;transition:background .15s}
.user-bar button:hover{background:rgba(255,255,255,.25)}

/* DETAIL */
#detail-header{background:linear-gradient(135deg,#0f172a,var(--theme));color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:47px;z-index:20}
#back-btn,#burger-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600}
#burger-btn{font-size:16px;padding:7px 10px}
#sidebar{width:220px;background:#fff;border-right:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0;transition:margin-left .25s ease}
#sidebar.closed{margin-left:-220px}
.sidebar-item{padding:8px 12px;cursor:pointer;font-size:12px;border-left:3px solid transparent;display:flex;align-items:center;gap:4px;line-height:1.3;color:#475569}
.sidebar-item:hover{background:#f8fafc}
.sidebar-item.active{border-left-color:var(--theme);background:#f0f4ff;font-weight:600;color:var(--theme)}
.sidebar-item .dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;flex-shrink:0;margin-left:auto}
.sidebar-notes{padding:8px 12px;cursor:pointer;font-size:12px;border-left:3px solid transparent;color:#92400e;display:flex;align-items:center;gap:4px}
.sidebar-notes.active{border-left-color:#f59e0b;background:#fef9ee;font-weight:600}
.sidebar-sources{padding:10px 12px;font-size:9.5px;line-height:1.5;border-top:1px solid #e2e8f0;margin-top:4px;background:#f8fafc}
.sidebar-sources .src-title{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sidebar-sources .src-item{margin-bottom:6px;padding:6px 8px;border-radius:6px;border-left:3px solid #ccc}
.sidebar-sources .src-pink{border-left-color:var(--pk);background:#fdf2f8}
.sidebar-sources .src-green{border-left-color:var(--gn);background:#f0fdf4}
#main-content{flex:1;overflow-y:auto;padding:14px 18px}
.section-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:12px}
.ann-item{background:#fef9ee;border:1px solid #fde68a;border-radius:8px;padding:7px 10px;margin-bottom:5px;font-size:12px;display:flex;justify-content:space-between;align-items:flex-start}
.ann-item .date{font-size:10px;color:#92400e;margin-top:2px}
.ann-item .del{background:none;border:none;color:#dc2626;cursor:pointer;padding:4px 6px;font-size:18px;line-height:1;border-radius:4px}
.ann-item .del:hover{background:#fee2e2}
.ann-item .edit{background:none;border:none;color:#2563eb;cursor:pointer;padding:4px 6px;font-size:16px;line-height:1;border-radius:4px}
.ann-item .edit:hover{background:#dbeafe}
.ann-actions{display:flex;gap:2px;flex-shrink:0;align-items:center}
.edit-form{margin-top:4px}
.edit-form textarea{width:100%;border:1px solid #93c5fd;border-radius:6px;padding:6px;font-size:12px;resize:vertical;font-family:inherit}
.edit-form button{font-size:11px;padding:4px 10px;border:none;border-radius:4px;cursor:pointer;margin-top:4px;margin-right:4px}
.pdf-btn{background:#f1f5f9;color:#475569;border:1.5px solid #cbd5e1;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px;margin:12px 0}
.pdf-btn:hover{background:#e2e8f0}
#pdf-render{position:fixed;left:-9999px;top:0;width:800px;background:#fff;z-index:-1;overflow:visible;padding:30px 35px}
.ann-section{font-size:10px;font-weight:700;color:#b45309;margin-bottom:2px}
#add-note-btn{background:#fff;border:1px dashed #cbd5e1;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;color:#64748b;width:100%;text-align:left}
#note-form{background:#fff;border:1px solid #fde68a;border-radius:8px;padding:10px;display:none}
#note-form textarea{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:8px;font-size:12px;resize:vertical;font-family:inherit}
#save-note{background:var(--theme);color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:12px;cursor:pointer;font-weight:600}
#cancel-note{background:#f1f5f9;color:#64748b;border:none;border-radius:6px;padding:6px 16px;font-size:12px;cursor:pointer}
#sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:9}
.loading{text-align:center;padding:40px;color:#94a3b8}
.spinner{border:3px solid #e2e8f0;border-top:3px solid var(--theme);border-radius:50%;width:28px;height:28px;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PROFILE MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;padding:28px;max-width:400px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h2{font-size:18px;color:var(--theme);margin-bottom:16px}
.modal label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px;margin-top:12px}
.modal input,.modal select{width:100%;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit}
.color-options{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s}
.color-dot.active{border-color:#1e293b}
.color-dot:hover{opacity:.85}
</style>
</head>
<body>

<div class="auth-box">

Continuer avec Google

<script>
// SUPABASE INIT
const SUPA_URL='https://tnwacgnqutaapwxbtpoy.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRud2FjZ25xdXRhYXB3eGJ0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjE0OTAsImV4cCI6MjA5MDg5NzQ5MH0.ByxLOgLP8C3P24WuSJALi6_A0l2-dHHJnvYYOji9h-c';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY,{
  auth:{
    persistSession:false,
    autoRefreshToken:false,
    detectSessionInUrl:false
  }
});

const SESSION_KEY='oncofiches_session';

function saveSession(session){
  if(session){
    localStorage.setItem(SESSION_KEY,JSON.stringify({
      access_token:session.access_token,
      refresh_token:session.refresh_token,
      user:session.user
    }));
  }
}

function clearSession(){
  localStorage.removeItem(SESSION_KEY);
}

function getSavedSession(){
  try{
    const s=localStorage.getItem(SESSION_KEY);
    return s?JSON.parse(s):null;
  }catch(e){return null}
}

const COLORS=['#2a4d8f','#0f766e','#7c3aed','#be185d','#c2410c','#15803d','#9333ea','#0891b2','#b91c1c','#a16207','#4f46e5','#059669'];
let user=null,profile=null,cancers=[],sections={},annotations=[],curF=null,curS=0,sidebarOpen=true;

// AUTH
let appInitialized=false;

async function checkSession(){
  const{data,error}=await sb.auth.getSession();
  if(data.session&&data.session.user){
    user=data.session.user;
    if(!appInitialized)await initApp();
  } else {
    document.getElementById('auth-page').style.display='flex';
    document.getElementById('app').style.display='none';
  }
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if((event==='SIGNED_IN'||event==='TOKEN_REFRESHED')&&session&&session.user){
    user=session.user;
    if(!appInitialized)await initApp();
  }
  if(event==='SIGNED_OUT'){
    user=null;profile=null;appInitialized=false;
    document.getElementById('app').style.display='none';
    document.getElementById('auth-page').style.display='flex';
  }
});

function switchTab(tab){
  document.getElementById('tab-login').className='auth-tab'+(tab==='login'?' active':'');
  document.getElementById('tab-signup').className='auth-tab'+(tab==='signup'?' active':'');
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-signup').style.display=tab==='signup'?'block':'none';
  document.getElementById('auth-message').innerHTML='';
}

function showAuthMsg(msg,ok){
  document.getElementById('auth-message').innerHTML=`<div class="auth-msg ${ok?'auth-msg-ok':'auth-msg-err'}">${msg}</div>`;
}

async function loginGoogle(){
  const{data,error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+window.location.pathname}});
  if(error)showAuthMsg(error.message,false);
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-password').value;
  if(!email||!pw)return showAuthMsg('Veuillez remplir tous les champs.',false);
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){
    if(error.message.includes('Invalid login'))showAuthMsg('Email ou mot de passe incorrect.',false);
    else showAuthMsg(error.message,false);
  } else if(data.session){
    saveSession(data.session);
    user=data.session.user;
    appInitialized=true;
    await initApp();
  }
}

async function doSignup(){
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const pw=document.getElementById('signup-password').value;
  if(!email||!pw)return showAuthMsg('Veuillez remplir tous les champs.',false);
  if(pw.length<6)return showAuthMsg('Le mot de passe doit contenir au moins 6 caractères.',false);
  const{data,error}=await sb.auth.signUp({email,password:pw,options:{data:{full_name:name||email.split('@')[0]}}});
  if(error)showAuthMsg(error.message,false);
  else if(data.session){
    saveSession(data.session);
    user=data.session.user;
    appInitialized=true;
    await initApp();
  } else {
    showAuthMsg('✅ Compte créé ! Vérifiez votre email pour confirmer.',true);
  }
}

async function logout(){
  await sb.auth.signOut();
  user=null;profile=null;appInitialized=false;
  cancers=[];sections={};annotations=[];
  document.getElementById('app').style.display='none';
  document.getElementById('auth-page').style.display='flex';
  document.getElementById('auth-message').innerHTML='';
}

// INIT APP
async function initApp(){
  if(appInitialized && cancers.length > 0) return; // already loaded
  document.getElementById('auth-page').style.display='none';
  document.getElementById('app').style.display='block';

  const listEl=document.getElementById('list');
  listEl.style.display='block';
  listEl.innerHTML='<div class="loading"><div class="spinner"></div>Chargement des fiches...</div>';
  document.getElementById('detail').style.display='none';

  // Get current access token
  const saved = getSavedSession();
  const token = saved?.access_token;

  // Helper: fetch from Supabase REST API directly
  async function query(table, params=''){
    const res = await fetch(SUPA_URL+'/rest/v1/'+table+'?'+params, {
      headers:{
        'apikey':SUPA_KEY,
        'Authorization':'Bearer '+(token||SUPA_KEY),
        'Content-Type':'application/json'
      }
    });
    if(!res.ok){console.error('Query error '+table+':',res.status);return []}
    return await res.json();
  }

  // Load profile
  try{
    const p = await query('profiles','id=eq.'+user.id+'&limit=1');
    console.log('Profile loaded:', p.length);
    if(p.length>0){profile=p[0]}
    else{profile={display_name:user.user_metadata?.full_name||user.user_metadata?.name||user.email?.split('@')[0]||'Utilisateur',role:'Autre',theme_color:'#2a4d8f'}}
  }catch(e){
    console.error('Profile error:',e);
    profile={display_name:user.email?.split('@')[0]||'Utilisateur',role:'Autre',theme_color:'#2a4d8f'};
  }
  applyTheme(profile.theme_color||'#2a4d8f');
  document.getElementById('user-name').textContent=profile.display_name||'Utilisateur';
  document.getElementById('user-role').textContent=profile.role||'';
  document.getElementById('user-avatar').textContent=(profile.display_name||'U').charAt(0).toUpperCase();

  // Update last login (non-blocking)
  fetch(SUPA_URL+'/rest/v1/profiles?id=eq.'+user.id,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+(token||SUPA_KEY),'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({last_login:new Date().toISOString()})}).catch(()=>{});

  // Load cancers
  try{
    const raw = await query('cancers','select=*,cancer_categories(name)&order=display_order');
    console.log('Cancers loaded:', raw.length);
    cancers = raw || [];
  }catch(e){console.error('Cancers error:',e);cancers=[]}

  // Load sections
  try{
    const raw = await query('cancer_sections','select=*&order=display_order');
    console.log('Sections loaded:', raw.length);
    sections={};
    (raw||[]).forEach(sec=>{if(!sections[sec.cancer_id])sections[sec.cancer_id]=[];sections[sec.cancer_id].push(sec)});
  }catch(e){console.error('Sections error:',e);sections={}}

  // Load annotations
  try{
    const raw = await query('annotations','user_id=eq.'+user.id+'&order=created_at.desc');
    console.log('Annotations loaded:', raw.length);
    annotations = raw || [];
  }catch(e){console.error('Annotations error:',e);annotations=[]}

  console.log('InitApp complete. Cancers:',cancers.length);
  renderListView();
}

function applyTheme(color){
  document.documentElement.style.setProperty('--theme',color);
}

async function saveProfile(){

function filterList(){
  const input=document.getElementById('searchbar');
  const q=input?input.value.toLowerCase():'';

  const fl=cancers.filter(f=>{
    const secs=sections[f.id]||[];
    return !q||f.name.toLowerCase().includes(q)||secs.some(s=>s.title.toLowerCase().includes(q)||s.html_content.toLowerCase().includes(q));
  });
  c.innerHTML=fl.map(f=>{
    const a=annotations.filter(x=>x.fiche_id===f.id).length;
    const ns=(sections[f.id]||[]).length;
    const cat=f.cancer_categories?f.cancer_categories.name:'';
    return `<div class="card" style="border-left-color:${f.color}" onclick="openFiche('${f.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="flex:1">

// DETAIL VIEW
function openFiche(id){

  document.getElementById('detail').style.display='block';

function goBack(){curF=null;renderListView();document.getElementById('list').style.display='block';document.getElementById('detail').style.display='none'}

function toggleSidebar(){
  const s=document.getElementById('sidebar'),o=document.getElementById('sidebar-overlay');
  if(s.classList.contains('closed')){s.classList.remove('closed');o.classList.add('open');sidebarOpen=true;document.getElementById('burger-btn').innerHTML='✕'}
  else{s.classList.add('closed');o.classList.remove('open');sidebarOpen=false;document.getElementById('burger-btn').innerHTML='☰'}
}

function renderDetail(){
  if(!curF)return;
  const secs=sections[curF.id]||[];
  const a=annotations.filter(x=>x.fiche_id===curF.id);
  document.getElementById('detail-title').textContent=curF.name;
  document.getElementById('detail-meta').textContent=`MAJ ${curF.last_updated||'—'} · ${a.length} note(s)`;

  secs.forEach((s,i)=>{
    const act=i===curS&&curS>=0;
    const ha=a.some(x=>x.section_index===i);
    sb+=`<div class="sidebar-item${act?' active':''}" onclick="setSection(${i})" ${act?'style="border-left-color:'+curF.color+'"':''}>
      <span style="flex:1">${s.title}</span>${ha?'<span class="dot"></span>':''}
    </div>`;
  });
  sb+='<div style="border-top:1px solid #e2e8f0;margin:4px 0"></div>';
  sb+=`<div class="sidebar-notes${curS===-1?' active':''}" onclick="setSection(-1)">📝 Mes notes (${a.length})</div>`;

  document.getElementById('sidebar').innerHTML=sb;
  renderContent();
}

function setSection(i){
  curS=i;renderDetail();
  if(window.innerWidth<=768){toggleSidebar()}
}

function renderContent(){
  const mc=document.getElementById('main-content');
  const secs=sections[curF.id]||[];
  const a=annotations.filter(x=>x.fiche_id===curF.id);

  if(curS>=0&&secs[curS]){
    const sec=secs[curS];
    const sa=a.filter(x=>x.section_index===curS);
    let h=`<div class="section-card"><div class="content">${sec.html_content}</div></div>`;
    if(sa.length>0){
      h+='<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#92400e;margin-bottom:4px">📝 Notes sur cette section</div>';

      });
      h+='</div>';
    }
    h+=`<button id="add-note-btn" onclick="showNF()">+ Ajouter une note sur « ${sec.title} »</button>`;
    h+=`<div id="note-form"><textarea id="note-text" rows="3" placeholder="Votre annotation..."></textarea><div style="display:flex;gap:6px;margin-top:6px"><button id="save-note" onclick="saveN()">Enregistrer</button><button id="cancel-note" onclick="hideNF()">Annuler</button></div></div>`;
    mc.innerHTML=h;
  } else {
    let h='<div class="section-card"><h3 style="color:#92400e;border-bottom-color:#f59e0b">📝 Toutes mes notes</h3>';
    if(a.length===0)h+='<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px">Aucune annotation. Sélectionnez une section pour en ajouter.</div>';
    else a.forEach(x=>{
      h+=`<div class="ann-item" id="ann-${x.id}"><div style="flex:1"><div class="ann-section">${x.section_title||'Général'}</div><div class="ann-text-${x.id}">${x.content}</div><div class="date">${new Date(x.created_at).toLocaleDateString('fr-FR')}</div><div class="edit-form" id="edit-form-${x.id}" style="display:none"><textarea id="edit-text-${x.id}" rows="2">${x.content}</textarea><button onclick="confirmEdit(${x.id})" style="background:var(--theme);color:#fff">Enregistrer</button><button onclick="cancelEdit(${x.id})" style="background:#f1f5f9;color:#64748b">Annuler</button></div></div><div class="ann-actions"><button class="edit" onclick="startEdit(${x.id})" title="Modifier">✏️</button><button class="del" onclick="delAnn(${x.id})" title="Supprimer">🗑</button></div></div>`;
    });
    h+='</div>';
    
    mc.innerHTML=h;
  }

// Edit annotation
function startEdit(id){
  document.getElementById('edit-form-'+id).style.display='block';
  const textEl=document.querySelector('.ann-text-'+id);
  if(textEl)textEl.style.display='none';
  document.getElementById('edit-text-'+id).focus();
}

function cancelEdit(id){
  document.getElementById('edit-form-'+id).style.display='none';
  const textEl=document.querySelector('.ann-text-'+id);
  if(textEl)textEl.style.display='block';
}

async function confirmEdit(id){
  const newText=document.getElementById('edit-text-'+id).value.trim();
  if(!newText)return;
  const saved=getSavedSession();
  const token=saved?.access_token;
  try{
    await fetch(SUPA_URL+'/rest/v1/annotations?id=eq.'+id,{
      method:'PATCH',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+(token||SUPA_KEY),'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({content:newText})
    });
    const ann=annotations.find(x=>x.id===id);
    if(ann)ann.content=newText;
    renderDetail();
  }catch(e){alert('Erreur: '+e.message)}
}

// PDF Export - direct download
async function exportPDF(){
  if(!curF)return;
  const secs=sections[curF.id]||[];
  const a=annotations.filter(x=>x.fiche_id===curF.id);
  if(secs.length===0){alert('Aucune section à exporter.');return}

    html+=`<h2 style="color:${color};font-size:13px;border-bottom:2px solid ${color};padding-bottom:4px;margin:0 0 8px">${sec.title}</h2>`;

    content=content.replace(/<h3[^>]*>.*?<\/h3>/gi,'');
    html+=`<div>${content}</div>`;
    const secAnns=a.filter(x=>x.section_index===i);

  // Create render container (must be visible for html2canvas)
  const container=document.createElement('div');
  container.id='pdf-render';
  container.innerHTML=`<style>
    #pdf-render{font-family:'Segoe UI',Arial,sans-serif;font-size:10px;color:#1e293b;line-height:1.45}

    #pdf-render li{margin-bottom:1px}

  document.body.appendChild(container);

    const pageW=pdf.internal.pageSize.getWidth();
    const pageH=pdf.internal.pageSize.getHeight();
    const margin=8;
    const contentW=pageW-margin*2;

    // Capture the container
    const canvas=await html2canvas(container,{
      scale:2,
      useCORS:true,
      logging:false,
      width:800,
      windowWidth:800,
      backgroundColor:'#ffffff'
    });

    const imgData=canvas.toDataURL('image/jpeg',0.95);
    const imgW=contentW;
    const imgH=(canvas.height*imgW)/canvas.width;

    // Split into pages
    let y=0;
    const pageContentH=pageH-margin*2;
    
    while(y<imgH){
      if(y>0)pdf.addPage();
      pdf.addImage(imgData,'JPEG',margin,-y+margin,imgW,imgH);
      y+=pageContentH;
    }

    const filename=curF.name.replace(/[^a-zA-Zéèêëàâäùûüôöïîç0-9 ]/g,'').replace(/\s+/g,'_')+'_'+dateStr.replace(/\//g,'-')+'.pdf';
    pdf.save(filename);
  }catch(e){
    console.error('PDF error:',e);
    alert('Erreur lors de la génération du PDF : '+e.message);
  }

  // Cleanup
  document.body.removeChild(container);
  btns.forEach(b=>{b.disabled=false;b.style.opacity='1';b.innerHTML='📄 Exporter en PDF'});
}

function showNF(){document.getElementById('add-note-btn').style.display='none';document.getElementById('note-form').style.display='block';document.getElementById('note-text').focus()}
function hideNF(){document.getElementById('add-note-btn').style.display='block';document.getElementById('note-form').style.display='none';document.getElementById('note-text').value=''}

async function saveN(){
  const t=document.getElementById('note-text').value.trim();if(!t||!curF)return;
  const secs=sections[curF.id]||[];
  const saved=getSavedSession();
  const token=saved?.access_token;
  const row={user_id:user.id,fiche_id:curF.id,section_index:curS>=0?curS:null,section_title:curS>=0?secs[curS]?.title:'Général',content:t};
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/annotations',{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+(token||SUPA_KEY),'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify(row)
    });
    if(res.ok){
      const data=await res.json();
      if(data.length>0)annotations.unshift(data[0]);
      renderDetail();
    } else {
      const err=await res.json().catch(()=>({}));
      alert('Erreur: '+(err.message||res.status));
    }
  }catch(e){alert('Erreur: '+e.message)}
}

async function delAnn(id){
  const saved=getSavedSession();
  const token=saved?.access_token;
  await fetch(SUPA_URL+'/rest/v1/annotations?id=eq.'+id,{
    method:'DELETE',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+(token||SUPA_KEY)}
  }).catch(()=>{});
  annotations=annotations.filter(x=>x.id!==id);
  renderDetail();
}

// START
console.log('OncoFiches starting...');

async function boot(){
  console.log('Boot: checking saved session...');
  const saved = getSavedSession();
  
  if(!saved || !saved.refresh_token){
    console.log('No saved session, showing login');
    document.getElementById('auth-page').style.display='flex';
    document.getElementById('app').style.display='none';
    return;
  }

  console.log('Found saved session for:', saved.user?.email);
  
  // Refresh token via REST API directly (bypass SDK which hangs)
  try{
    console.log('Refreshing token via REST API...');
    const res = await fetch(SUPA_URL+'/auth/v1/token?grant_type=refresh_token', {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
      body:JSON.stringify({refresh_token:saved.refresh_token})
    });
    
    console.log('REST refresh status:', res.status);
    
    if(res.ok){
      const data = await res.json();
      console.log('Token refreshed for:', data.user?.email);
      
      // Save new tokens
      saveSession({access_token:data.access_token, refresh_token:data.refresh_token, user:data.user});
      
      // Set session in SDK (non-blocking, don't await)
      sb.auth.setSession({access_token:data.access_token, refresh_token:data.refresh_token}).catch(()=>{});
      
      user = data.user;
      appInitialized = true;
      await initApp();
      return;
    } else {
      const err = await res.json().catch(()=>({}));
      console.log('Token refresh failed:', err.error_description || err.error || res.status);
    }
  }catch(e){
    console.log('REST refresh error:', e.message);
  }
  
  // If refresh failed, clear and show login
  console.log('Session expired, showing login');
  clearSession();
  document.getElementById('auth-page').style.display='flex';
  document.getElementById('app').style.display='none';
}

boot();
</script>
